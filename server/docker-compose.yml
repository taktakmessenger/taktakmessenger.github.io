version: '3.8'

services:
  # TakTak Core Blockchain Node
  taktak-node:
    image: ethereum/client-go:latest
    container_name: taktaknew_core
    volumes:
      - ./data:/taktaknew_data
      - ./genesis.json:/genesis.json
    ports:
      - "9545:9545"   # JSON-RPC
      - "30545:30545" # P2P
    environment:
      - NETWORK_ID=72727
    command: >
      --datadir /taktak_data
      --networkid 72727
      --port 30545
      --http --http.addr "0.0.0.0" --http.port 9545
      --http.corsdomain "*"
      --http.api "eth,net,web3,clique"
      --nodiscover
      --syncmode "full"
      --allow-insecure-unlock
    restart: unless-stopped

  # S3 Storage (MinIO)
  taktak-storage:
    image: minio/minio:latest
    container_name: taktaknew_s3
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console
    volumes:
      - ./minio_data:/data
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    restart: unless-stopped

  # Database (Optional, as MongoDB is used in index.ts)
  taktak-postgres:
    image: postgres:15
    container_name: taktaknew_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=taktak
      - POSTGRES_PASSWORD=taktak_secure
      - POSTGRES_DB=taktak_real
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # Cache
  taktak-redis:
    image: redis:7
    container_name: taktaknew_cache
    ports:
      - "6379:6379"
    restart: unless-stopped
