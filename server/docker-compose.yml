version: '3.8'
services:
  taktak-node:
    image: ethereum/client-go:latest
    container_name: taktaknew_core
    volumes:
      - ./data:/taktaknew_data
      - ./genesis.json:/genesis.json
    ports:
      - "9545:9545"   # JSON-RPC
      - "30545:30545" # P2P
    environment:
      - NETWORK_ID=72727
    command: >
      --datadir /taktak_data
      --networkid 72727
      --port 30545
      --http --http.addr "0.0.0.0" --http.port 9545
      --http.corsdomain "*"
      --http.api "eth,net,web3,clique"
      --nodiscover
      --syncmode "full"
      --allow-insecure-unlock
    restart: unless-stopped
